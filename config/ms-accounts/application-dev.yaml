spring:
  application:
    name: ms-accounts
  data:
    mongodb:
      uri: mongodb://localhost:27017/accounts_db_dev
  webflux:
    base-path: /

server:
  port: 8082

logging:
  level:
    com.bootcamp: DEBUG
    org.springframework.web: DEBUG
    org.springframework.cloud: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

services:
  customer:
    url: http://ms-customer:8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakermetrics
  endpoint:
    health:
      show-details: always
