spring:
  application:
    name: service-eureka

server:
  port: 8761

eureka:
  instance:
    hostname: ${EUREKA_HOSTNAME:service-eureka}
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
