spring:
  application:
    name: ms-customer
  data:
    mongodb:
      uri: mongodb://admin:{cipher}dcb9bf2e80d0752a6567adebe12a0f4c8f8cdca112b1792ba231490b125232f5fe547604d02ebfa01cf4996315cb8fa6@mongodb-prod:27017/ms_customer_prod?authSource=admin
      auto-index-creation: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://service-eureka:8761/eureka/}
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
