spring:
  application:
    name: ms-customer
  data:
    mongodb:
      uri: mongodb://admin:{cipher}192197c3bfcefc4c6d8fcf980d0ad2f2ee85ff9e22532e349c67d25e874abe8688f8bba85ef05cba715d2f4523cd6a54@mongodb-prod:27017/ms_customer_prod?authSource=admin
      auto-index-creation: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://service-eureka:8761/eureka/}
  instance:
    preferIpAddress: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
