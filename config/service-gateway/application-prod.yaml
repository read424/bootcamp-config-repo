spring:
  application:
    name: service-gateway
  cloud:
    gateway:
      routes:
        - id: ms-customer
          uri: lb://ms-customer
          predicates:
            - Path=/api/v1/customers/**

        - id: ms-accounts
          uri: lb://ms-accounts
          predicates:
            - Path=/api/v1/accounts/**

        - id: ms-transaction
          uri: lb://ms-transaction
          predicates:
            - Path=/transactions/**

        - id: ms-credits
          uri: lb://ms-credits
          predicates:
            - Path=/credits/**

        - id: ms-balance
          uri: lb://ms-balance
          predicates:
            - Path=/balance/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE:http://service-eureka:8761/eureka/}
  instance:
    preferIpAddress: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
