spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        - id: ms-transaction
          uri: lb://ms-transaction
          predicates:
            - Path=/transactions/**
          filters:
            - StripPrefix=0

        - id: ms-account
          uri: lb://ms-account
          predicates:
            - Path=/accounts/**
          filters:
            - StripPrefix=0

        - id: ms-credit
          uri: lb://ms-credit
          predicates:
            - Path=/credits/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
